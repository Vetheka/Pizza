services:
  db:
    image: mysql:5.7
    container_name: mysql
    restart: always
    environment:
      MYSQL_DATABASE: pizza
      MYSQL_USER: mysql_user
      MYSQL_PASSWORD: mysql_password
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - db_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: phpmyadmin
    restart: always
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: root_password

  phpapp:
    build: .
    image: pizzacompany:latest
    container_name: php-app
    environment:
      - MYSQL_HOST=db  # Environment variable for MySQL host (name of MySQL container)
      - MYSQL_USER=root
      - MYSQL_PASSWORD=root_password
      - MYSQL_DB=wordpress
    depends_on:
      - db
    ports:
     - "8082:80"

volumes:
  db_data: